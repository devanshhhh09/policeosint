name: PoliceOSINT CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  backend-tests:
    name: Backend — Unit Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: policeosint_test
          POSTGRES_USER: policeosint
          POSTGRES_PASSWORD: policeosint_secret
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports: ["5432:5432"]
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports: ["6379:6379"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Create test .env
        run: |
          cat > .env << 'ENVEOF'
          APP_NAME=PoliceOSINT
          APP_ENV=test
          DEBUG=false
          SECRET_KEY=test_secret_key_32_chars_minimum_abc
          DATABASE_URL=postgresql+asyncpg://policeosint:policeosint_secret@localhost:5432/policeosint_test
          REDIS_URL=redis://localhost:6379/0
          CELERY_BROKER_URL=redis://localhost:6379/1
          CELERY_RESULT_BACKEND=redis://localhost:6379/2
          ALLOWED_ORIGINS=["http://localhost:3000"]
          EVIDENCE_UPLOAD_DIR=/tmp/evidence_test
          ENVEOF

      - name: Run unit tests
        working-directory: backend
        run: |
          pytest tests/unit/ -v \
            --cov=app \
            --cov-report=xml \
            --cov-report=term-missing \
            -x
        env:
          PYTHONPATH: .

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: backend/coverage.xml
          fail_ci_if_error: false

  frontend-build:
    name: Frontend — Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Type check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Build
        working-directory: frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
          NEXT_PUBLIC_APP_NAME: PoliceOSINT

  security-scan:
    name: Security — Dependency Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install safety
        run: pip install safety bandit

      - name: Run safety check
        working-directory: backend
        run: safety check -r requirements.txt --ignore 70612 || true

      - name: Run bandit
        working-directory: backend
        run: bandit -r app/ -ll -ii || true

  docker-build:
    name: Docker — Build Check
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t policeosint-backend:${{ github.sha }} ./backend

      - name: Build frontend image
        run: docker build -f ./frontend/Dockerfile.dev -t policeosint-frontend:${{ github.sha }} ./frontend

      - name: Test health endpoint
        run: |
          docker run -d --name test_backend \
            -e DATABASE_URL=postgresql+asyncpg://x:x@localhost/x \
            -e SECRET_KEY=testsecret32charsminimumpadding \
            -e ALLOWED_ORIGINS='["http://localhost:3000"]' \
            -p 8000:8000 \
            policeosint-backend:${{ github.sha }} \
            uvicorn app.main:app --host 0.0.0.0 --port 8000 || true
          sleep 5
          curl -f http://localhost:8000/ || true
          docker stop test_backend || true
